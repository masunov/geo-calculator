version: "3.3"
services:
  app_blue:
    container_name: geo_calc_blue
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: always
    environment:
      APP_PORT: "8080"
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      APP_DEPLOY_FLAG: blue
      POLYGON_SOURCE_URL: ${POLYGON_SOURCE_URL}

  app_green:
    container_name: geo_calc_green
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: always
    environment:
      APP_PORT: "8080"
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      APP_DEPLOY_FLAG: green
      POLYGON_SOURCE_URL: ${POLYGON_SOURCE_URL}

  nginx:
    image: nginx:alpine
    container_name: geo_calc_nginx
    restart: always
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app_blue
      - app_green
